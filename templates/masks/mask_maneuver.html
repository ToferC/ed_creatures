<div id="mask-maneuver-{{ mask_maneuver.id }}" hx-target="this" hx-swap="outerHTML">
    <li>
        <strong>{{ mask_maneuver.name }}</strong> [{{ mask_maneuver.source }}]: {{ mask_maneuver.details }}
        <button hx-get="/{{ lang }}/edit_mask_maneuver/{{ mask_maneuver.id }}" hx-target="#mask-maneuver-{{ mask_maneuver.id }}" class="btn btn-info btn-sm">{{ fluent(key="edit-button", lang=lang) }}</button>
        <button hx-get="/{{ lang }}/delete_mask_maneuver/{{ mask_maneuver.id }}" hx-target="#mask-maneuver-{{ mask_maneuver.id }}" hx-swap="outerHTML" class="btn btn-danger btn-sm">{{ fluent(key="delete-button", lang=lang) }}</button>
    </li>
</div>
