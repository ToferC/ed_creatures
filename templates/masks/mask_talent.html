<div id="mask-talent-{{ mask_talent.id }}" hx-target="this" hx-swap="outerHTML">
    <li>
        <strong>{{ mask_talent.name }}</strong>: Step {{ mask_talent.action_step }}
        <button hx-get="/{{ lang }}/edit_mask_talent/{{ mask_talent.id }}" hx-target="#mask-talent-{{ mask_talent.id }}" class="btn btn-info btn-sm">{{ fluent(key="edit-button", lang=lang) }}</button>
        <button hx-get="/{{ lang }}/delete_mask_talent/{{ mask_talent.id }}" hx-target="#mask-talent-{{ mask_talent.id }}" hx-swap="outerHTML" class="btn btn-danger btn-sm">{{ fluent(key="delete-button", lang=lang) }}</button>
    </li>
</div>
