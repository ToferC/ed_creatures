<div id="mask-power-{{ mask_power.id }}" hx-target="this" hx-swap="outerHTML">
    <li>
        <strong>{{ mask_power.name }}</strong> ({{ mask_power.action_type }} vs. {{ mask_power.target }}): Step {{ mask_power.action_step }}{% if mask_power.effect_step %} / Step {{ mask_power.effect_step }}{% endif %}{% if mask_power.details %}: {{ mask_power.details }}{% endif %}
        <button hx-get="/{{ lang }}/edit_mask_power/{{ mask_power.id }}" hx-target="#mask-power-{{ mask_power.id }}" class="btn btn-info btn-sm">{{ fluent(key="edit-button", lang=lang) }}</button>
        <button hx-get="/{{ lang }}/delete_mask_power/{{ mask_power.id }}" hx-target="#mask-power-{{ mask_power.id }}" hx-swap="outerHTML" class="btn btn-danger btn-sm">{{ fluent(key="delete-button", lang=lang) }}</button>
    </li>
</div>
