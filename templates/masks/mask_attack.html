<div id="mask-attack-{{ mask_attack.id }}" hx-target="this" hx-swap="outerHTML">
    <li>
        <strong>{{ mask_attack.name }}</strong>: Step {{ mask_attack.action_step }} / Step {{ mask_attack.effect_step }}{% if mask_attack.details %}: {{ mask_attack.details }}{% endif %}
        <button hx-get="/{{ lang }}/edit_mask_attack/{{ mask_attack.id }}" hx-target="#mask-attack-{{ mask_attack.id }}" class="btn btn-info btn-sm">{{ fluent(key="edit-button", lang=lang) }}</button>
        <button hx-get="/{{ lang }}/delete_mask_attack/{{ mask_attack.id }}" hx-target="#mask-attack-{{ mask_attack.id }}" hx-swap="outerHTML" class="btn btn-danger btn-sm">{{ fluent(key="delete-button", lang=lang) }}</button>
    </li>
</div>
